services:
  - type: web
    runtime: static
    name: nofobo
    repo: https://github.com/uriva/nofobo
    branch: master
    buildCommand: npm install && npx vite build
    staticPublishPath: ./web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://nofobo.uriva.deno.net
